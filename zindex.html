<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Style>
        h1{
            text-align: center;
        }
        .container{
            height: 200px;
            width: 200px;
            margin: 150px auto;
            position: relative;

        }

        .it{
            border: 3px solid black;
            height: inherit;
            width: inherit;
            position: absolute;
        }

        #id1{
            top:130px;
            right: 130px;
            background-color: blueviolet;
            z-index:7;

        }
        #id2{
            top:-130px;
            right: 130px;
            background-color: rgb(11, 60, 237);
            
        }
        #id3{
            bottom:130px;
            left: 130px;
            background-color: rgb(167, 173, 18);
            z-index:5;
            
        }
        #id4{
            bottom:-130px;
            left: 130px;
            background-color: rgb(228, 163, 11);
            
        }
        #id5{
           
            background-color: rgb(52, 230, 12);
            z-index: 4;
            
        }
    </Style>
</head>
<body>
    <h1>
        Z Index
    </h1>
    <div class="container">
        <div class="it" id="id1">Box1</div>
        <div class="it" id="id2">Box2</div>
        <div class="it" id="id3">Box3</div>
        <div class="it" id="id4">Box4</div>
        <div class="it" id="id5">Box5</div>
    </div>

    
</body>
</html>
